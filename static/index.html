<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ava — Neurofive Sales Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Ava</h1>
        <p class="tag">Your friendly Neurofive Sales Assistant</p>
      </header>

      <section id="chat" class="chat-window"></section>

      <form id="chat-form" class="chat-form">
        <div class="inputs">
          <input id="message" type="text" placeholder="Type your question to Ava..." autocomplete="off" required />
          <button id="send" type="submit">Send</button>
        </div>

        <details class="contact-details">
          <summary>Optional contact info (for handoff)</summary>
          <label>Name <input id="contact-name" type="text" placeholder="Your name" /></label>
          <label>Email <input id="contact-email" type="email" placeholder="you@example.com" /></label>
          <label>Phone <input id="contact-phone" type="tel" placeholder="(optional)" /></label>
        </details>
      </form>

      <footer class="footer">
        <small>Powered by Neurofive · Backend: <code>/chat</code> (FastAPI)</small>
      </footer>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
